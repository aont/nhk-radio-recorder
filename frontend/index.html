<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NHK Radio Recorder</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <header>
    <h1>NHK Radio Recorder</h1>
  </header>

  <main>
    <nav class="tab-nav" aria-label="Main sections">
      <button type="button" class="tab-button" data-tab="series-events">Series Browser and Events</button>
      <button type="button" class="tab-button" data-tab="reservations">Reservations</button>
      <button type="button" class="tab-button" data-tab="recordings">Recordings</button>
      <button type="button" class="tab-button" data-tab="configuration">Configuration</button>
    </nav>

    <section class="tab-panel" data-panel="configuration">
      <h2>Backend Connection</h2>
      <div class="filters">
        <input id="backendBaseUri" placeholder="https://api.example.com" />
        <button id="saveBackendBaseUri" type="button">Save backend URI</button>
      </div>
      <div id="backendBaseUriStatus" class="small"></div>
    </section>

    <section class="tab-panel" data-panel="series-events">
      <h2>Series Browser</h2>
      <div class="filters">
        <input id="keyword" placeholder="Search title" />
        <select id="broadcastFilter">
          <option value="">All broadcasts</option>
          <option value="R1">R1</option>
          <option value="FM">FM</option>
        </select>
        <button id="loadSeries">Load Series</button>
      </div>
      <ul id="seriesList"></ul>

      <h2>Events</h2>
      <div id="eventTarget">Select a series.</div>
      <ul id="eventsList"></ul>
    </section>

    <section class="tab-panel" data-panel="reservations">
      <h2>Reservations</h2>
      <button id="refreshReservations">Refresh</button>
      <h3>Series</h3>
      <ul id="seriesWatchReservationList"></ul>
      <h3>Events</h3>
      <ul id="singleEventReservationList"></ul>
    </section>

    <section class="tab-panel player-section" data-panel="recordings">
      <h2>Recordings</h2>
      <button id="refreshRecordings">Refresh</button>
      <button id="bulkDownload">Bulk Download Selected (ZIP no compression)</button>
      <ul id="recordingList"></ul>
      <h3>Player</h3>
      <div class="player-controls">
        <button id="seekBack10" type="button">⏪ -10s</button>
        <button id="seekForward10" type="button">+10s ⏩</button>
      </div>
      <div id="nowPlaying" class="now-playing">Now Playing: Not playing</div>
      <audio id="player" controls></audio>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
